# ============================================
# Eco-Schedule: Carbon-Aware Batch Processing
# ============================================

spring.application.name=GreenScheduler

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:greenscheduler
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Carbon Monitor Configuration
carbon.threshold=600
data.file.path=dataset.xls
simulation.interval-ms=3000

# Server
server.port=8080
